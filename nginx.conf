# ── Marketing site: datashuttle.ai ────────────────────────────────────
server {
    listen 80 default_server;
    server_name datashuttle.ai www.datashuttle.ai _;
    root /usr/share/nginx/html;
    index index.html;

    server_tokens off;

    # security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self'; frame-ancestors 'none';" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
    }

    # #633 — the early-access Node container + `/api/early-access` relay
    # are retired; the marketing site now links straight to the cloud
    # console at `/cloud` (no proxied form submissions from the landing
    # page anymore). Any `/api/*` traffic is a stale bookmark — let it
    # fall through to the SPA so the router can render a 404-friendly
    # state instead of exposing a dead upstream.

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# ── Documentation: docs.datashuttle.ai (#634) ─────────────────────────
# Serves the mdbook built by the docs-builder stage in website/Dockerfile.
# Separate server block so the SPA's index.html fallback doesn't mask
# mdbook 404s (each mdbook page is a real .html file, no client-side
# routing to rescue a typo).
server {
    listen 80;
    server_name docs.datashuttle.ai;
    root /usr/share/nginx/html/docs-site;
    index index.html;

    server_tokens off;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    # mdbook's search UI injects inline <script> + <style>; allow them.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none';" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # mdbook assets (css/, js/, fonts/) are content-hashed per release —
    # safe to cache long. html pages stay short-lived so doc updates
    # land on the next pageview.
    location ~* \.(css|js|woff2?|ttf|svg|png|ico)$ {
        expires 30d;
        add_header Cache-Control "public";
    }

    # Directory-style URLs (e.g. /installation/) — try the directory's
    # index.html, then fall through to a hard 404 (no SPA fallback).
    location / {
        try_files $uri $uri/ $uri.html $uri/index.html =404;
    }
}
